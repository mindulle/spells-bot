name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    services:
      piston:
        image: ghcr.io/mindulle/piston:latest
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.PAT_TOKEN }}
        ports:
          - 2000:2000
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Formatting (Prettier)
        run: npx prettier --check "src/**/*.ts"

      - name: Type Check (Build)
        run: npm run build

      - name: Run Unit Tests (Vitest)
        run: npm run test
