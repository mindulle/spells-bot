name: Docker Build and Publish

on:
  push:
    branches: ['main']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Docker Buildx (required for caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Infrastructure Repository (GitOps)
        if: github.ref == 'refs/heads/main'
        env:
          INFRA_REPO: mindulle/sonagi-iac
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "❌ Error: PAT_TOKEN is not set in GitHub Secrets."
            echo "Please create a Personal Access Token with repo scope and add it as PAT_TOKEN."
            exit 1
          fi

          echo "🔄 Cloning infrastructure repository..."
          git clone https://${GH_TOKEN}@github.com/${INFRA_REPO}.git infra-repo
          cd infra-repo

          # Get short SHA of the current build (7 characters to match Docker metadata)
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          NEW_IMAGE="ghcr.io/${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}"

          echo "📝 Updating manifest to use image: ${NEW_IMAGE}"
          MANIFEST_PATH="kubernetes/spells-bot/02-deployment.yaml"

          # Replace the image line using sed
          sed -i "s|image: ghcr.io/mindulle/spells-bot:.*|image: ${NEW_IMAGE}|g" $MANIFEST_PATH

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $MANIFEST_PATH

          # Only push if there are changes
          if git diff --staged --quiet; then
            echo "✅ No changes to commit. Image is already up to date."
          else
            git commit -m "chore(spells-bot): auto-update image to sha-${SHORT_SHA} [skip ci]"
            echo "🚀 Pushing changes to ${INFRA_REPO}..."
            git push origin main
            echo "🎉 Manifest updated successfully! ArgoCD will sync shortly."
          fi
